# ~/.config/tmux/themes/zen.conf

# === COULEURS ===
set -g @primary '#b4befe'
set -g @secondary '#6c7086'
set -g @border '#313244'

# === POSITION ===
set -g status-position top

# === STYLE GLOBAL ===
set -g status-style 'bg=default fg=#{@secondary}'
set -g status-justify left

# === GAUCHE : session ===
set -g status-left-length 30
set -g status-left '#[fg=#{@primary},bold]  #S #[fg=#{@secondary}]│ '

# === WINDOWS ===
set -g window-status-format '#[fg=#{@secondary}] ○ #W '
set -g window-status-current-format '#[fg=#{@primary},bold] ● #W '
set -g window-status-separator ''

# === PANES ===
set -g pane-border-style 'fg=#{@border}'
set -g pane-active-border-style 'fg=#{@primary}'
set -g pane-border-status top
set -g pane-border-format ' #[fg=#{@primary}]#{pane_title} '


